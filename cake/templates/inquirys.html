{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry</title>
    <link rel="stylesheet" href="{% static 'succ.css' %}">
    <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f4f4f9;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
        }
    
        .form-container {
          background: #ffffff;
          padding: 20px;
          border-radius: 8px;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          width: 400px;
        }
    
        h1 {
          font-size: 1.5em;
          margin-bottom: 20px;
          text-align: center;
        }
    
        textarea {
          width: 100%;
          height: 150px;
          padding: 10px;
          font-size: 1em;
          border: 1px solid #ccc;
          border-radius: 5px;
          resize: none;
          box-sizing: border-box;
          margin-bottom: 15px;
        }

        .readonly {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
          }
    
        button {
          display: block;
          width: 100%;
          padding: 10px;
          font-size: 1em;
          color: #ffffff;
          background-color: #007bff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          margin-top: 10px;
        }
    
        button:hover {
          background-color: #0056b3;
        }
      </style>
</head>
<body>
    <div class="form-container">
        <h1>Complain Form</h1>
        <form action="/cake/inquirys/" method="POST">
          {% csrf_token %}
          <textarea  id="issue" name="issue" placeholder="Type your complain here..."></textarea>
          
          <button type="submit">Submit</button>
          
        </form>
        <br>
        <br>
          {% for inquiry in inquiry %}
          <textarea class="readonly" placeholder="Admin reply here..." readonly>{{inquiry.ans}}</textarea>
          {% endfor %}
        {% comment %} </form> {% endcomment %}
    </div>
</body>
</html>
