{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty Cake Cart</title>
  <style>
    /* Reset and body styles */
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Comic Sans MS', cursive, sans-serif;
}

body {
  background-color:#fff8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #6a4e37;
}

.cart-container {
  text-align: center;
  background-color: #fff;
  border: 2px solid #f0d9b5;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.cart-title {
  font-size: 28px;
  margin-bottom: 20px;
}

.empty-cart {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cake-image {
  width: 150px;
  height: auto;
  margin-bottom: 20px;
}

.message {
  font-size: 18px;
  margin-bottom: 15px;
}

.shop-link {
  text-decoration: none;
  background:linear-gradient(90deg, #b8860b, #d4af37);
  color: #fff;
  padding: 10px 20px;
  border-radius: 5px;
  font-size: 16px;
}

.shop-link:hover {
  background: linear-gradient(90deg, #cdaa25, #ffd700);
}

  </style>
</head>
<body>
  <div class="cart-container">
    <h1 class="cart-title">My Cake Cart</h1>
    <div class="empty-cart">
      <p class="message">Oops! Your cart is looking empty. Treat yourself to some delicious cakes!</p>
      <a href="/cake/home" class="shop-link">Browse Cakes</a>
    </div>
  </div>
</body>
</html>
